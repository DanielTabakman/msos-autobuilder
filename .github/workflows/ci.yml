name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check . --output-format=json > ruff-report.json
      - name: Preserve Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
          if-no-files-found: error
          retention-days: 7
      - name: Pytest
        run: python -m pytest -q --junitxml=pytest-report.xml
      - name: Preserve Pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
          if-no-files-found: error
          retention-days: 7

  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Pytest
        run: python -m pytest -q --junitxml=pytest-windows-report.xml
      - name: Preserve Windows Pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-windows-report
          path: pytest-windows-report.xml
          if-no-files-found: error
          retention-days: 7
