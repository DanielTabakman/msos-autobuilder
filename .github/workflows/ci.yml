name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff autofix witness
        run: python -m ruff check tests/test_revision_loop.py --fix
      - name: Upload Ruff-fixed test
        uses: actions/upload-artifact@v4
        with:
          name: ruff-fixed-revision-test
          path: tests/test_revision_loop.py
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest -q
