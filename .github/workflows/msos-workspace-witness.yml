name: MSOS Workspace Witness

on:
  pull_request:
    paths:
      - .github/workflows/msos-workspace-witness.yml
      - src/msos_autobuilder/backends/base.py
      - src/msos_autobuilder/backends/git_clone.py
      - src/msos_autobuilder/backends/plan_only.py
      - src/msos_autobuilder/scheduler.py
      - src/msos_autobuilder/workspace_witness.py
      - src/msos_autobuilder/cli.py
      - tests/test_git_clone_backend.py
      - tests/test_scheduler.py
      - tests/test_workspace_witness.py
  push:
    branches: [main]
    paths:
      - .github/workflows/msos-workspace-witness.yml
      - src/msos_autobuilder/backends/base.py
      - src/msos_autobuilder/backends/git_clone.py
      - src/msos_autobuilder/backends/plan_only.py
      - src/msos_autobuilder/scheduler.py
      - src/msos_autobuilder/workspace_witness.py
      - src/msos_autobuilder/cli.py
      - tests/test_git_clone_backend.py
      - tests/test_scheduler.py
      - tests/test_workspace_witness.py

permissions:
  contents: read

jobs:
  real-msos-workspaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Autobuilder
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout MSOS main read-only
        uses: actions/checkout@v4
        with:
          repository: DanielTabakman/Probability-prediction-engine
          ref: main
          fetch-depth: 0
          path: product-source
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Autobuilder
        run: python -m pip install -e ".[dev]"

      - name: Run focused workspace tests
        run: |
          python -m pytest -q \
            tests/test_git_clone_backend.py \
            tests/test_workspace_witness.py \
            tests/test_scheduler.py::test_scheduler_renews_leases_during_execution

      - name: Materialize two isolated MSOS workspaces
        run: |
          mkdir -p artifacts
          python -m msos_autobuilder workspace-witness \
            --source product-source \
            --workspace-root "$RUNNER_TEMP/msos-lane-workspaces" \
            --runtime-root "$RUNNER_TEMP/msos-autobuilder-runtime" \
            --json-out artifacts/msos-workspace-witness.json
          {
            echo '```json'
            cat artifacts/msos-workspace-witness.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prove source checkout remains clean
        run: test -z "$(git -C product-source status --porcelain)"

      - name: Upload witness evidence
        uses: actions/upload-artifact@v4
        with:
          name: msos-workspace-witness
          path: artifacts/msos-workspace-witness.json
          if-no-files-found: error
